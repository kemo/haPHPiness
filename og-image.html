<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>haPHPiness OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,800;0,900;1,800;1,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: linear-gradient(135deg, #4B4E7A 0%, #777BB4 40%, #8E91C8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  position: relative;
}

/* Subtle pattern overlay */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 15% 80%, rgba(255, 255, 255, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.04) 0%, transparent 40%);
}

/* Gold accent line at top */
body::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, transparent 5%, #C9A84C 20%, #E8C96D 50%, #C9A84C 80%, transparent 95%);
}

.card {
  position: relative;
  z-index: 1;
  text-align: center;
  color: #fff;
  padding: 60px;
}

.title {
  font-family: 'Nunito', sans-serif;
  font-size: 96px;
  font-weight: 900;
  letter-spacing: -1px;
  margin-bottom: 24px;
  text-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
}

.title .php {
  font-style: italic;
  color: #E8C96D;
}

.tagline {
  font-size: 32px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.92);
  line-height: 1.4;
  max-width: 800px;
  margin: 0 auto 36px;
}

.badge {
  display: inline-block;
  font-size: 18px;
  font-weight: 700;
  color: #C9A84C;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 2px solid rgba(201, 168, 76, 0.4);
  border-radius: 100px;
  padding: 10px 28px;
}

.url {
  position: absolute;
  bottom: 32px;
  right: 48px;
  font-size: 20px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
  <div class="card">
    <div class="title">ha<span class="php">PHP</span>iness</div>
    <div class="tagline">67 things in PHP that make developers genuinely happy</div>
    <div class="badge">PHP 5.4 → 8.5</div>
  </div>
  <div class="url">haphpiness.com</div>
</body>
</html>
